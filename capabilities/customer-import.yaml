naftiko: 1.0.0-alpha2
info:
  label: CargoDocs Customer Data/Docs API — Import
  description: 'CargoDocs Customer Data/Docs API — Import. 1 operations. Lead operation: CargoDocs Import Shipment Data. Self-contained
    Naftiko capability covering one Cargodocs business surface.'
  tags:
  - Cargodocs
  - Import
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CARGODOCS_API_KEY: CARGODOCS_API_KEY
capability:
  consumes:
  - type: http
    namespace: customer-import
    baseUri: https://api-test.cargodocs.com/v3
    description: CargoDocs Customer Data/Docs API — Import business capability. Self-contained, no shared references.
    resources:
    - name: common-import
      path: /common/import
      operations:
      - name: importshipmentdata
        method: POST
        description: CargoDocs Import Shipment Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: importRef
          in: query
          type: string
          description: The import reference identifier (e.g., LNGBL559)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CARGODOCS_API_KEY}}'
  exposes:
  - type: rest
    namespace: customer-import-rest
    port: 8080
    description: REST adapter for CargoDocs Customer Data/Docs API — Import. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/common/import
      name: common-import
      description: REST surface for common-import.
      operations:
      - method: POST
        name: importshipmentdata
        description: CargoDocs Import Shipment Data
        call: customer-import.importshipmentdata
        with:
          importRef: rest.importRef
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: customer-import-mcp
    port: 9090
    transport: http
    description: MCP adapter for CargoDocs Customer Data/Docs API — Import. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: cargodocs-import-shipment-data
      description: CargoDocs Import Shipment Data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: customer-import.importshipmentdata
      with:
        importRef: tools.importRef
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
