naftiko: 1.0.0-alpha2
info:
  label: CargoDocs Issuer API — Surrender
  description: 'CargoDocs Issuer API — Surrender. 1 operations. Lead operation: CargoDocs Receive Surrendered eBoL. Self-contained
    Naftiko capability covering one Cargodocs business surface.'
  tags:
  - Cargodocs
  - Surrender
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CARGODOCS_API_KEY: CARGODOCS_API_KEY
capability:
  consumes:
  - type: http
    namespace: issuer-surrender
    baseUri: https://api-test.cargodocs.com/v3
    description: CargoDocs Issuer API — Surrender business capability. Self-contained, no shared references.
    resources:
    - name: issuer-surrender
      path: /issuer/surrender
      operations:
      - name: receivesurrender
        method: POST
        description: CargoDocs Receive Surrendered eBoL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CARGODOCS_API_KEY}}'
  exposes:
  - type: rest
    namespace: issuer-surrender-rest
    port: 8080
    description: REST adapter for CargoDocs Issuer API — Surrender. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/issuer/surrender
      name: issuer-surrender
      description: REST surface for issuer-surrender.
      operations:
      - method: POST
        name: receivesurrender
        description: CargoDocs Receive Surrendered eBoL
        call: issuer-surrender.receivesurrender
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issuer-surrender-mcp
    port: 9090
    transport: http
    description: MCP adapter for CargoDocs Issuer API — Surrender. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cargodocs-receive-surrendered-ebol
      description: CargoDocs Receive Surrendered eBoL
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuer-surrender.receivesurrender
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
