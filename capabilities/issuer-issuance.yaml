naftiko: 1.0.0-alpha2
info:
  label: CargoDocs Issuer API — Issuance
  description: 'CargoDocs Issuer API — Issuance. 3 operations. Lead operation: CargoDocs Create Draft eBoL. Self-contained
    Naftiko capability covering one Cargodocs business surface.'
  tags:
  - Cargodocs
  - Issuance
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CARGODOCS_API_KEY: CARGODOCS_API_KEY
capability:
  consumes:
  - type: http
    namespace: issuer-issuance
    baseUri: https://api-test.cargodocs.com/v3
    description: CargoDocs Issuer API — Issuance business capability. Self-contained, no shared references.
    resources:
    - name: issuer-draft
      path: /issuer/draft
      operations:
      - name: createdraft
        method: POST
        description: CargoDocs Create Draft eBoL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: issuer-issue
      path: /issuer/issue
      operations:
      - name: issuedocument
        method: POST
        description: CargoDocs Issue eBoL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: issuer-re-issue
      path: /issuer/re-issue
      operations:
      - name: reissue
        method: POST
        description: CargoDocs Re-Issue eBoL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CARGODOCS_API_KEY}}'
  exposes:
  - type: rest
    namespace: issuer-issuance-rest
    port: 8080
    description: REST adapter for CargoDocs Issuer API — Issuance. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/issuer/draft
      name: issuer-draft
      description: REST surface for issuer-draft.
      operations:
      - method: POST
        name: createdraft
        description: CargoDocs Create Draft eBoL
        call: issuer-issuance.createdraft
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issuer/issue
      name: issuer-issue
      description: REST surface for issuer-issue.
      operations:
      - method: POST
        name: issuedocument
        description: CargoDocs Issue eBoL
        call: issuer-issuance.issuedocument
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issuer/re-issue
      name: issuer-re-issue
      description: REST surface for issuer-re-issue.
      operations:
      - method: POST
        name: reissue
        description: CargoDocs Re-Issue eBoL
        call: issuer-issuance.reissue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issuer-issuance-mcp
    port: 9090
    transport: http
    description: MCP adapter for CargoDocs Issuer API — Issuance. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: cargodocs-create-draft-ebol
      description: CargoDocs Create Draft eBoL
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuer-issuance.createdraft
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cargodocs-issue-ebol
      description: CargoDocs Issue eBoL
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuer-issuance.issuedocument
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cargodocs-re-issue-ebol
      description: CargoDocs Re-Issue eBoL
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuer-issuance.reissue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
