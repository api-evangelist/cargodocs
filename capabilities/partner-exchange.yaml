naftiko: 1.0.0-alpha2
info:
  label: CargoDocs Partner API — Exchange
  description: 'CargoDocs Partner API — Exchange. 2 operations. Lead operation: CargoDocs Get Partner Customer Ids. Self-contained
    Naftiko capability covering one Cargodocs business surface.'
  tags:
  - Cargodocs
  - Exchange
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CARGODOCS_API_KEY: CARGODOCS_API_KEY
capability:
  consumes:
  - type: http
    namespace: partner-exchange
    baseUri: https://api-test.cargodocs.com/v3
    description: CargoDocs Partner API — Exchange business capability. Self-contained, no shared references.
    resources:
    - name: exchange-customers
      path: /exchange/customers
      operations:
      - name: getpartnercustomerids
        method: GET
        description: CargoDocs Get Partner Customer Ids
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: exchange-employees
      path: /exchange/employees
      operations:
      - name: getpartnercustomeremployeeids
        method: GET
        description: CargoDocs Get Partner Customer Employee Ids
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CARGODOCS_API_KEY}}'
  exposes:
  - type: rest
    namespace: partner-exchange-rest
    port: 8080
    description: REST adapter for CargoDocs Partner API — Exchange. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/exchange/customers
      name: exchange-customers
      description: REST surface for exchange-customers.
      operations:
      - method: GET
        name: getpartnercustomerids
        description: CargoDocs Get Partner Customer Ids
        call: partner-exchange.getpartnercustomerids
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/exchange/employees
      name: exchange-employees
      description: REST surface for exchange-employees.
      operations:
      - method: GET
        name: getpartnercustomeremployeeids
        description: CargoDocs Get Partner Customer Employee Ids
        call: partner-exchange.getpartnercustomeremployeeids
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: partner-exchange-mcp
    port: 9090
    transport: http
    description: MCP adapter for CargoDocs Partner API — Exchange. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cargodocs-get-partner-customer-ids
      description: CargoDocs Get Partner Customer Ids
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partner-exchange.getpartnercustomerids
      outputParameters:
      - type: object
        mapping: $.
    - name: cargodocs-get-partner-customer-employee
      description: CargoDocs Get Partner Customer Employee Ids
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partner-exchange.getpartnercustomeremployeeids
      outputParameters:
      - type: object
        mapping: $.
