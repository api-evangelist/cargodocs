specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: CargoDocs
providerId: cargodocs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Trade Documentation
  - Shipping
  - Supply Chain
description: 'FOCUS-aligned FinOps for CargoDocs (EssDocs): enterprise license + per-document fees on
  electronic bills of lading and trade documents; billing is contract-based.'
notes: CargoDocs/EssDocs does not publish public API or document-volume pricing. FinOps mapping is provisional
  pending enterprise-contract reconciliation.
sources:
  - https://www.essdocs.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Electronic Shipping Solutions Limited
serviceCategory: Trade Documentation Platform
billingModel:
  pricingCategory: Subscription + Per-Document
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: CargoDocs DocEx
  ServiceCategory: Trade Documentation Platform
  ProviderName: CargoDocs
  PublisherName: Electronic Shipping Solutions Limited
  InvoiceIssuerName: Electronic Shipping Solutions Limited
  BillingCurrency: USD
meters:
  - name: enterprise_license
    unit: year
    aggregation: sum
    dimensions:
      - module
  - name: document_issuance
    unit: document
    aggregation: sum
    dimensions:
      - document_type
      - issuer
      - geography
  - name: document_transfers
    unit: event
    aggregation: sum
    dimensions:
      - document_type
  - name: named_users
    unit: seat-month
    aggregation: max
    dimensions:
      - role
principles:
  - name: Visibility
    description: Visibility into document-volume costs is via EssDocs customer reports; the platform
      audit log identifies issuance, transfer, and surrender events for cost attribution.
  - name: Allocation
    description: Allocate by issuer entity (carrier/NVOCC), trade lane, and document type; multi-business-unit
      customers should configure separate issuer codes.
  - name: Optimization
    description: Consolidate document issuance windows, retire unused user seats, and align module selection
      to active document types.
  - name: Accountability
    description: Trade-operations / digital-trade lead owns the relationship; quarterly volume reviews
      with EssDocs are typical.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
