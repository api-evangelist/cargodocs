description: CargoDocs (operated by EssDocs) is a B2B trade-documentation platform sold as enterprise
  software to carriers, NVOCCs, shippers, and trade-finance banks. Its three REST APIs (Partner, Issuer,
  Customer Data/Docs) are accessed under enterprise commercial agreements; pricing is not published publicly
  and is typically scoped to document volume, user counts, and integration tier.
notes: No public API pricing page found. CargoDocs/EssDocs sells via direct enterprise sales; reconcile
  against the customer's specific commercial agreement.
sources:
  - https://www.essdocs.com/
plans:
  - id: cargodocs-enterprise
    name: CargoDocs DocEx Enterprise
    type: enterprise
    description: Enterprise license covering Partner API, Issuer API, and Customer Data/Docs API. Priced
      by document volume, user counts, and module selection (eBoL, SWB, eWW, etc.).
    entries:
      - label: Enterprise license
        name: enterprise_license
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Document volume
        name: document_volume
        type: metered
        metric: document
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: CargoDocs Partner API
      - name: CargoDocs Issuer API
      - name: CargoDocs Customer Data/Docs API
      - name: Electronic Bills of Lading (eBoL)
      - name: Sea Waybills (SWB)
      - name: Warehouse Warrants (eWW)
