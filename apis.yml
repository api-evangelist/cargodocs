name: CargoDocs
description: >-
  CargoDocs, operated by EssDocs, is a digital trade documentation
  platform that eliminates paper-based shipping documents by letting
  carriers, shippers, banks, and partner platforms issue, sign,
  transfer, and surrender original electronic bills of lading (eBoL),
  sea waybills (SWB), warehouse warrants (eWW), and supporting trade
  documents. CargoDocs DocEx is used by container lines, NVOCCs,
  bulk/tanker carriers, commodity shippers, and trade finance banks
  to move documents in minutes rather than days while retaining
  negotiability and legal effect. Developers interact with CargoDocs
  through three OpenAPI-described REST APIs hosted on ReadMe - the
  Partner API (embed DocEx in third-party platforms), the Issuer API
  (carrier/NVOCC issuance and amendments), and the Customer Data/Docs
  API (exporter drafting and back-office integration).
